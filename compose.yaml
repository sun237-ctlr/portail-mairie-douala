name: portail-mairie-douala

services:
  database:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-portail_mairie}
      POSTGRES_USER: ${POSTGRES_USER:-portail_mairie}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-this-database-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://${POSTGRES_USER:-portail_mairie}:${POSTGRES_PASSWORD:-change-this-database-password}@database:5432/${POSTGRES_DB:-portail_mairie}?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-this-jwt-secret-before-public-use}
      FRONTEND_URL: ${PUBLIC_URL:-http://localhost}
      CORS_ORIGINS: ${PUBLIC_URL:-http://localhost}
      UPLOAD_DIR: /app/uploads
      ADMIN_CODE: ${ADMIN_CODE:-ADMIN001}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-ChangeMeAdmin123!}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASS: ${EMAIL_PASS:-}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:5000/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  uploads_data:
