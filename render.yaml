services:
  - type: web
    name: portail-mairie-backend
    env: node
    plan: free
    branch: main
    root: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: FRONTEND_URL
        value: https://portail-mairie-frontend.onrender.com
        sync: false

  - type: static
    name: portail-mairie-frontend
    env: static
    plan: free
    branch: main
    root: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: "/*"
        destination: "/index.html"
    envVars:
      - key: VITE_API_URL
        value: https://portail-mairie-backend.onrender.com
        sync: false
